name: Backend CI

on:
  push:
    paths:
      - "app/backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          cd app/backend
          pip install -r requirements.txt

      - name: Run Unit Test
        run: |
          cd app/backend
          python -m pytest -v

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build -t devops-backend ./app/backend

      - name: Trivy Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-backend:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL

      - name: Tag Backend Image
        run: |
          docker tag devops-backend:latest 622488711452.dkr.ecr.us-east-1.amazonaws.com/devops-backend:v2

      - name: Push Backend Image
        run: |
          docker push 622488711452.dkr.ecr.us-east-1.amazonaws.com/devops-backend:v2
name: Frontend CI

on:
  push:
    paths:
      - "app/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - run: docker build -t devops-frontend ./app/frontend

      - run: docker tag devops-frontend:latest 622488711452.dkr.ecr.us-east-1.amazonaws.com/devops-frontend:v1

      - run: docker push 622488711452.dkr.ecr.us-east-1.amazonaws.com/devops-frontend:v1
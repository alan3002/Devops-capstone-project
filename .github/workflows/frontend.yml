name: Frontend CI

on:
  push:
    paths:
      - "app/frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Frontend Validation Test
        run: |
          test -f app/frontend/Dockerfile
          echo "Frontend test passed"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend Image
        run: |
          docker build -t devops-frontend ./app/frontend

      - name: Trivy Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-frontend:latest
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL

      - name: Tag Frontend Image
        run: |
          docker tag devops-frontend:latest 622488711452.dkr.ecr.us-east-1.amazonaws.com/devops-frontend:v2

      - name: Push Frontend Image
        run: |
          docker push 622488711452.dkr.ecr.us-east-1.amazonaws.com/devops-frontend:v2